# Лидеры мнений в X (Twitter) для разведки Скаута, по трекам.
# Это ПЕРВИЧНЫЕ голоса (Тир-1/2 по скорости): тут тезис появляется РАНЬШЕ блога/RSS,
# а X не индексируется веб-поиском — поэтому дип-ресёрч их не видит. Это эдж Скаута.
# Аккаунты НЕ авторитетны автоматически: Скаут всё равно проверяет на гем, красные
# линии и прослеживание цифр к первоисточнику. Стартовый список — правь под себя.
# Указывай хэндл без @ (как в адресе x.com/<handle>).
crypto:
  - CryptoHayes        # Arthur Hayes — макро/крипта, референс-ядро
  - LynAldenContact    # Lyn Alden — макро/ликвидность
  - glassnode          # ончейн-аналитика
  - RaoulGMI           # Raoul Pal — макро-циклы
  - saylor             # Michael Saylor — BTC-тезис
  - WuBlockchain       # быстрые первичные новости рынка
ai:
  - balajis            # Balaji — пересечение AI × крипта × макро
  - naval              # тех/макро-рамки
  - VitalikButerin     # крипта × AI, инфра доверия
