# Лидеры мнений в X (Twitter) для разведки Скаута, по трекам.
# Это ПЕРВИЧНЫЕ голоса (Тир-1/2 по скорости): тут тезис появляется РАНЬШЕ блога/RSS,
# а X не индексируется веб-поиском — поэтому дип-ресёрч их не видит. Это эдж Скаута.
# Аккаунты НЕ авторитетны автоматически: Скаут всё равно проверяет на гем, красные
# линии и прослеживание цифр к первоисточнику. Указывай хэндл без @ (как в x.com/<handle>).
#
# ПОРЯДОК ВАЖЕН: по умолчанию scan_x читает верхние ~12 (параметр max_accounts) —
# держи самых сильных вверху. Ниже — профессиональная «скамейка» для глубоких/точечных сканов.
# Правь свободно: добавить — впиши строку с хэндлом; убрать — удали строку.
crypto:
  # --- Ядро: макро/ликвидность/ончейн (даёт «почему» и контрарные углы) ---
  - CryptoHayes        # Arthur Hayes — макро/ликвидность
  - LynAldenContact    # Lyn Alden — макро, потоки капитала
  - glassnode          # ончейн-аналитика
  - RaoulGMI           # Raoul Pal — макро-циклы
  - saylor             # Michael Saylor — BTC-тезис
  - nic__carter        # Nic Carter — ресёрч, BTC, индустрия (Castle Island)
  - DariusDale42       # Darius Dale (42 Macro) — институциональный макро
  - woonomic           # Willy Woo — ончейн-модели
  # --- Ресёрч-фонды и аналитические дома (профессиональные разборы/тезисы) ---
  - MessariCrypto      # Messari — данные/ресёрч
  - Delphi_Digital     # Delphi — глубокий ресёрч
  - dragonfly_xyz      # крипто-VC, тезисные разборы
  - hiFramework        # крипто-VC, тезисные нарративы
  - a16zcrypto         # a16z crypto — индустриальный ресёрч
  - paradigm           # Paradigm — топ-ресёрч-фонд
  - cburniske          # Chris Burniske — фреймворки оценки (Placeholder)
  # --- Фаундеры/инфра/институты (первичный сигнал «что строится, куда идут деньги») ---
  - VitalikButerin     # Ethereum — крипта × AI, инфра доверия
  - haydenzadams       # Uniswap — DeFi
  - rleshner           # Superstate — RWA/токенизация (макро-мост)
  - toly               # Solana — инфра/экосистема
  - brian_armstrong    # CEO Coinbase — регуляции/политика × крипта
  - cz_binance         # Binance — двигает рынок, первичные сигналы
  - CaitlinLong_       # Caitlin Long (Custodia) — банки/институты × крипта
ai:
  # --- AI × крипта мост: реальное применение, платежи, ончейн-агенты (приоритетный гем) ---
  - jessepollak        # Jesse Pollak (Base/Coinbase) — ончейн AI-агенты и платежи (agentic payments)
  - cdixon             # Chris Dixon (a16z) — AI × крипта инфра, «read/write/own»
  - packyM             # Packy McCormick (Not Boring) — синтез AI×крипта×тех, куда идёт индустрия
  - balajis            # Balaji — пересечение AI × крипта × макро
  # --- Фронтир-AI: пульс «куда идёт AI» (контекст/направление тренда; мост к крипте искать) ---
  - sama               # Sam Altman (OpenAI) — направление/капекс AI (макро-мост: энергия → ликвидность)
  - karpathy           # Andrej Karpathy — фронтир AI, высокий сигнал (чистый AI = контекст, не пост)
  - naval              # тех/макро-рамки
