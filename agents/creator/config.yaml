# Конфиг агента «Криейтор»
name: Криейтор
model: claude-opus-4-8            # письмо флагманов — качество текста критично; запуск по запросу, цена оправдана
token_env: CREATOR_BOT_TOKEN     # свой бот (см. .env)
api_key_env: CREATOR_ANTHROPIC_KEY  # свой ключ Claude (если пуст — общий ANTHROPIC_API_KEY)
thinking: adaptive               # адаптивное мышление: острее композиция и точнее соблюдение красных линий. Поддерживает Opus/Sonnet 4.6. Убери строку, чтобы выключить.
web_search: true                 # фактчек: проверять цифры/даты/цены ПЕРЕД выдачей (самая дорогая ошибка — непроверенная цифра). false, если SDK/доступ не поддерживает.
custom_emoji: true               # подставлять кастом-эмодзи из data/custom_emoji.json (пак «News Emoji»). Только у Криейтора — у остальных ботов обычные эмодзи.
