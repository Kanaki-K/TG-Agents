# Конфиг агента «Скаут»
name: Скаут
model: claude-sonnet-4-6           # тонкое суждение (релевантность/достоверность) + оркестрация инструментов; баланс цены/качества
token_env: SCOUT_BOT_TOKEN         # свой бот (см. .env)
api_key_env: SCOUT_ANTHROPIC_KEY   # свой ключ Claude (если пуст — общий ANTHROPIC_API_KEY)
web_search: true                   # встроенный веб-поиск Anthropic; поставь false, если SDK/доступ его не поддерживает
auto_schedule: false               # АВТО-прогоны /digest и /curate раз в неделю. false = только по запросу (бережём токены). Поставь true, когда захочешь проактивность.
thinking: adaptive                 # адаптивное мышление: острее суждение (гем-детект, бренд-фит) за умеренный токен-бюджет. Поддерживает Sonnet 4.6 / Opus. Убери строку, чтобы выключить.
